services:
  - type: web
    name: aire-backend
    runtime: python
    region: oregon          # choose: oregon | frankfurt | singapore | ohio
    plan: free              # free | starter | standard | pro
    branch: main

    # Render will run this to install dependencies
    buildCommand: pip install -r requirements.txt

    # Render will run this to start the server
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT

    # Health-check so Render knows the service is alive
    healthCheckPath: /

    # Environment variables — set the SECRET values in the Render dashboard,
    # not here. Only non-secret defaults live in this file.
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"

      # ── Secrets: add these in Render Dashboard → Environment ──
      # MONGO_URI          (your MongoDB Atlas connection string)
      # JWT_SECRET_KEY     (your JWT signing secret)
      # GEMINI_API_KEY     (your Google Gemini API key)

      # ── Optional defaults (override in dashboard if needed) ──
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: ALGORITHM
        value: "HS256"
