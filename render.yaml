services:
  - type: web
    name: aire-backend
    runtime: python
    region: oregon
    plan: free
    branch: main

    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT

    healthCheckPath: /

    envVars:
      - key: PYTHON_VERSION
        value: "3.10.13"

      # ── Set these SECRET values in Render Dashboard → Environment ──
      # MONGO_URI          → your MongoDB Atlas connection string
      # JWT_SECRET_KEY     → your JWT signing secret
      # GEMINI_API_KEY     → your Google Gemini API key

      # ── Non-secret defaults ──
      - key: DATABASE_NAME
        value: "pm_recommender"
      - key: JWT_ALGORITHM
        value: "HS256"
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
