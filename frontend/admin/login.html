<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIRE Admin | Secure Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#1E3A8A",
                        "accent": "#F97316",
                        "bg-light": "#F1F5F9",
                        "surface": "#FFFFFF",
                        "text-main": "#1E293B",
                        "text-muted": "#64748B",
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-bg-light text-text-main min-h-screen flex items-center justify-center p-6 overflow-hidden">
    <!-- Subtle background accents -->
    <div class="fixed top-[-10%] right-[-10%] size-96 bg-primary/5 rounded-full blur-[120px]"></div>
    <div class="fixed bottom-[-10%] left-[-10%] size-96 bg-accent/5 rounded-full blur-[120px]"></div>

    <div class="w-full max-w-md relative z-10">
        <div class="text-center mb-10">
            <div
                class="inline-flex size-14 bg-primary rounded-2xl items-center justify-center shadow-2xl shadow-primary/20 mb-6">
                <span class="material-symbols-outlined text-white text-3xl font-black">security</span>
            </div>
            <h1 class="text-2xl font-black tracking-tight mb-2 text-primary uppercase">Command Access</h1>
            <p class="text-text-muted text-[10px] font-black uppercase tracking-[0.3em] opacity-60">Identity
                Verification Required • v2.1</p>
        </div>

        <div class="glass-panel p-10 shadow-2xl shadow-primary/10">
            <form id="login-form" class="space-y-6">
                <div>
                    <label
                        class="block text-[10px] font-black uppercase tracking-widest text-text-muted mb-2 px-1">Operator
                        Identifier</label>
                    <div class="relative">
                        <span
                            class="material-symbols-outlined absolute left-4 top-3.5 text-lg text-text-muted/40">alternate_email</span>
                        <input type="email" id="email" required placeholder="admin@aire.gov"
                            class="w-full bg-bg-light/50 border border-border-color rounded-xl pl-12 pr-5 py-4 text-sm focus:border-primary/50 focus:ring-1 focus:ring-primary/20 outline-none transition-all placeholder:text-text-muted/30 text-text-main">
                    </div>
                </div>
                <div>
                    <label
                        class="block text-[10px] font-black uppercase tracking-widest text-text-muted mb-2 px-1">Security
                        Access Key</label>
                    <div class="relative">
                        <span
                            class="material-symbols-outlined absolute left-4 top-3.5 text-lg text-text-muted/40">key</span>
                        <input type="password" id="password" required placeholder="••••••••••••"
                            class="w-full bg-bg-light/50 border border-border-color rounded-xl pl-12 pr-5 py-4 text-sm focus:border-primary/50 focus:ring-1 focus:ring-primary/20 outline-none transition-all placeholder:text-text-muted/30 text-text-main">
                    </div>
                </div>

                <div id="error-message"
                    class="hidden p-4 rounded-xl bg-red-50 border border-red-100 text-red-600 text-[10px] font-black uppercase tracking-widest text-center">
                </div>

                <button type="submit"
                    class="w-full bg-primary hover:bg-primary/90 text-white py-4 rounded-xl flex items-center justify-center gap-3 text-xs font-black uppercase tracking-widest transition-all shadow-xl shadow-primary/20">
                    Verify Identity
                    <span class="material-symbols-outlined text-sm">verified_user</span>
                </button>
            </form>
        </div>

        <div class="mt-10 flex flex-col items-center gap-2">
            <p class="text-[9px] text-text-muted font-black uppercase tracking-[0.2em]">Authorized Personnel Only</p>
            <div class="h-px w-8 bg-border-color"></div>
            <p class="text-[8px] text-text-muted/40 font-medium">AIRE-SECURE-ENCLAVE</p>
        </div>
    </div>

    <script type="module">
        import { auth } from './js/auth.js';

        const form = document.getElementById('login-form');
        const errorEl = document.getElementById('error-message');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            errorEl.classList.add('hidden');
            const btn = e.target.querySelector('button');
            const originalText = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<div class="size-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></div> VERIFYING...';

            try {
                const success = await auth.login(email, password);
                if (success) {
                    window.location.href = 'index.html';
                }
            } catch (error) {
                errorEl.innerText = error.message;
                errorEl.classList.remove('hidden');
                btn.disabled = false;
                btn.innerHTML = originalText;
            }
        });
    </script>
</body>

</html>
