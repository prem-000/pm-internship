<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIRE Admin | Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" href="css/admin.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#1E3A8A",
                        "accent": "#F97316",
                        "success": "#10B981",
                        "warning": "#F59E0B",
                        "danger": "#EF4444",
                        "bg-light": "#F1F5F9",
                        "surface": "#FFFFFF",
                        "text-main": "#1E293B",
                        "text-muted": "#64748B",
                        "border-color": "#E2E8F0",
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-bg-light text-text-main min-h-screen">
    <div id="app" class="flex min-h-screen">
        <!-- Sidebar -->
        <aside id="sidebar-container"
            class="w-72 border-r border-border-color bg-surface fixed h-full z-50 transition-all duration-300">
        </aside>

        <!-- Main Content -->
        <main class="flex-1 ml-72 min-h-screen flex flex-col">
            <!-- Header -->
            <header id="header-container"
                class="h-20 border-b border-border-color px-8 flex items-center justify-between sticky top-0 bg-surface/80 backdrop-blur-md z-40">
            </header>

            <!-- Page Content -->
            <div id="main-content" class="p-8 flex-1">
                <!-- Content will be injected here -->
                <div class="flex items-center justify-center h-full">
                    <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-primary"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- Modals Container -->
    <div id="modal-container" class="fixed inset-0 z-[100] hidden"></div>

    <!-- Toasts Container -->
    <div id="toast-container" class="fixed bottom-8 right-8 z-[200] flex flex-col gap-4"></div>

    <script type="module" src="js/app.js"></script>
</body>

</html>
